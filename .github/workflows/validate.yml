name: validate

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this job only needs to read the checked-out code.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate marketplace, plugin manifests, and skills
        run: node .github/scripts/validate.mjs
